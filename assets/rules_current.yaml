# ======== 延迟排除关键词（标题含这些词不直接排除，需 VIP 正文判断）========
# 规则：标题含词 → 标记 deferred_exclude_kw → VIP 正文读完后检查
# 正文含照明相关词 → 保留；正文无照明相关词 → 排除
# 照明相关词列表（固定）：灯具、照明、灯杆、路灯、亮化、LED、灯光、灯饰、光源
