  - "人行道及绿化工程"
  - "绿化工程"
  # 医院/学校：标题命中核心照明词时不直接排除，进入正文复判
  - "医院"
  - "学校采购"
  - "学校"

# ======== 评分权重 ========
# ⚠️ 注意：此段当前为【参考/文档用途】，实际权重硬编码在 bid_screening_v1.py 的评分函数中
#   score_amount() = 30分, score_industry() = 25分, score_region() = 15分
#   score_qualification() = 15分, score_time() = 10分
#   如需调整权重，需修改 bid_screening_v1.py 对应函数
score_weights:
  amount: 30        # 金额范围
  industry: 25      # 行业匹配
  region: 15        # 地区
  qualification: 15 # 资质要求（标题推断）
  time: 10          # 时间窗口
  blacklist: 5      # 黑名单（暂无数据，默认满分）

# ======== 地区评分 ========
# 格式：前缀 → 分数，越靠前优先匹配
region_scores:
  - prefix: "广东-中山"
    score: 15       # 本地优势
  - prefix: "广东-深圳"
    score: 13
  - prefix: "广东-广州"
    score: 13
  - prefix: "广东-东莞"
    score: 12
  - prefix: "广东-佛山"
    score: 12
  - prefix: "广东-珠海"
    score: 11
  - prefix: "广东-惠州"
    score: 11
  - prefix: "广东-"
    score: 10       # 其他广东城市
  - prefix: ""
    score: 3        # 非广东
